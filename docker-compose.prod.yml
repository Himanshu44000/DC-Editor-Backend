services:
  postgres:
    image: postgres:16-alpine
    container_name: dc-editor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dc_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dc_editor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dc-editor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  code-executor-image:
    image: code-executor:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dc-editor-code-executor
    restart: unless-stopped
    command: ["bash", "-lc", "sleep infinity"]

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: dc-editor-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dc_editor
      REDIS_URL: redis://redis:6379
      USE_EXECUTION_QUEUE: "true"
      TRUST_PROXY: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: dc-editor-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dc_editor
      REDIS_URL: redis://redis:6379
      USE_DOCKER: "true"
      USE_EXECUTION_QUEUE: "true"
      EXECUTION_WORKER_CONCURRENCY: "4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      code-executor-image:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
